name: CI - 112034047

on:
  push:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  ci:
    name: Typecheck / Prettier / Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        id: typecheck
        run: npm run typecheck

      - name: Prettier check
        id: prettier
        run: npm run format:check

      - name: Prepare test report directory
        id: prepare_tests
        run: mkdir -p reports

      - name: Run tests
        id: tests
        run: npm run test:ci

      - name: Publish test report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() && hashFiles('reports/junit.xml') != '' }}
        with:
          name: Vitest Test Results
          path: reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: CI Summary
        if: always()
        run: |
          {
            echo "# CI Summary"
            echo ""
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| TypeScript typecheck | ${{ steps.typecheck.outcome }} |"
            echo "| Prettier check       | ${{ steps.prettier.outcome }} |"
            echo "| Vitest tests         | ${{ steps.tests.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
